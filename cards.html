<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #home {

        }

        #home > .cards-wrapper {
            display: flex;
            flex-wrap: wrap;
            margin-left: 0.5rem;
            margin-right: 0.5rem;
        }

        #home > .cards-wrapper > section {
            width: 100%;
            height: 23.125rem;
            position: relative;
        }

        .card-content {
            background-color: white;
            height: 100%;
            font-family: Roboto, Helvetica, Arial, sans-serif;
            /* border: #333 solid 1px; */
            border-radius: 0.375rem;
            box-shadow: rgba(0, 0, 0, 0.2) 0px 3px 5px -1px, rgba(0, 0, 0, 0.14) 0px 5px 8px 0px, rgba(0, 0, 0, 0.12) 0px 1px 14px 0px;
        }

        .card-content p {
            padding-left: 1.0rem;
            line-height: 1.5rem;
        }

        .card-header {
            padding: 0.05rem 1rem;
        }

        .card-header > h2 {
            font-size: 1.125rem;
        }

        .image-window {
            width: 100%;
            height: auto;
            height: 100px;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .btn-wrapper {
            text-align: center;
        }

        .button-org {
            /* background-color: orangered; */
            background: linear-gradient(to bottom right, #ffa200 0%, #ec8046 100%);
            border: none;
            color: white;
            padding: 10px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 1.2rem;

        }

        .circle-mask {
            width: 200px;              /* Fixed size for the circle */
            height: 200px;
            border-radius: 50%;        /* Makes it a circle */
            overflow: hidden;          /* Hides overflow outside the circle */
            display: block;
            margin: 0 auto 20px auto;
        }

        .circle-mask img {
            width: 100%;
            height: 100%;
            object-fit: cover;         /* Prevents distortion, fills the circle */
            display: block;
        }

        .button-org:hover {
            box-shadow:0 4px 8px 0 rgba(0,0,0,0.6)
        }

        @media only screen and (min-width: 650px) {
            #home > .cards-wrapper > section {
                width: 50%;
            }
        }

        @media (min-width: 768px) {
            .card-content {
                margin: 0 12px 20px;
            }
        }

         @media only screen and (min-width: 1056px) {
            #home > .cards-wrapper > section {
                width: 33.3%;
            }
        }

         @media only screen and (min-width: 1440px) {
            #home > .cards-wrapper > section {
                width: 25%;
            }
        }

         @media only screen and (min-width: 2560px) {
            #home > .cards-wrapper > section {
                width: 20%;
            }
        }
    </style>
</head>
<body>
    <div id="home">
        <div class="cards-wrapper">
            <section>
                <div class="card-content">
                    <div class="card-header">
                        <h2>Classes &amp; Registration</h2>
                    </div>
                    <img class="image-window" src="https://laspositascollege.edu/canvas/files/images/newreg.jpg" alt="Placeholder Image" />
                    <p>Add/drop classes, see your class schedule and more</p>
                    <div class="btn-wrapper"><a href="#" class="button-org center">Register for Classes</a></div>
                </div>
            </section>
            <section>
                <div class="card-content">
                    <div class="card-header">
                        <h2>Pay Your Fees</h2>
                    </div>
                    <div class="circle-mask">
                        <img class="image-window" src="https://laspositascollege.edu/canvas/files/images/newreg.jpg" alt="Placeholder Image" />
                    </div>
                    
                    <div class="btn-wrapper"><a href="#" class="button-org center">Pay Now</a></div>
                </div>
            </section>
            <section>
                <div class="card-content">
                    <div class="card-header">
                        <h2>To do:</h2>
                    </div>

                </div>
            </section>
            <section>
                <div class="card-content">
                    <div class="card-header">
                        <h2>Student Records</h2>
                    </div>

                </div>
            </section>
        </div>
    </div>
</body>
</html>
